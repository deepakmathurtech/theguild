<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Immediate scrollbar - no flash -->
    <style>
      nav::-webkit-scrollbar,div::-webkit-scrollbar{width:5px}
      nav::-webkit-scrollbar-track,div::-webkit-scrollbar-track{background:transparent}
      nav::-webkit-scrollbar-thumb,div::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}
      nav,div{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
    </style>
    <link rel="icon" type="image/png" href="/guild-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/guild-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#dcb36c" />
    <meta name="color-scheme" content="dark light" />

    <!-- SEO & Metadata -->
    <title>Guild — Verified Work. Real Impact.</title>
    <meta name="description" content="Guild is a civilization-oriented work verification platform. Organizations post needs, members complete quests, and every outcome is verified. Build a proof-of-work identity through real contributions." />
    <meta name="keywords" content="guild, verified work, proof of work, quests, reputation, skill verification, organizations, impact, career growth, freelance, professional network" />
    <meta name="author" content="Guild" />
    <link rel="canonical" href="https://guild.com/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- OpenGraph -->
    <meta property="og:title" content="Guild — Verified Work. Real Impact." />
    <meta property="og:description" content="A civilization-oriented work verification platform. Organizations post needs, members complete quests, and every outcome is verified." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://guild.com/" />
    <meta property="og:site_name" content="Guild" />
    <meta property="og:image" content="https://guild.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Guild — Verified Work. Real Impact." />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Guild — Verified Work. Real Impact." />
    <meta name="twitter:description" content="A civilization-oriented work verification platform. Organizations post needs, members complete quests, and every outcome is verified." />
    <meta name="twitter:image" content="https://guild.com/og-image.png" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Guild",
      "description": "A civilization-oriented work verification platform connecting organizations with verified contributors.",
      "url": "https://guild.com",
      "logo": "https://guild.com/guild-logo.png",
      "areaServed": "India",
      "serviceType": ["Work Verification", "Skill Verification", "Professional Network", "Career Development"]
    }
    </script>

    <!-- Structured Data - WebSite (enables sitelinks search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Guild",
      "url": "https://guild.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://guild.com/quests?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:sans-serif;">
        <h1>Guild</h1>
        <p>JavaScript is required to run Guild. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
