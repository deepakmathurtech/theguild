<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Immediate scrollbar - no flash -->
    <style>
      nav::-webkit-scrollbar,div::-webkit-scrollbar{width:5px}
      nav::-webkit-scrollbar-track,div::-webkit-scrollbar-track{background:transparent}
      nav::-webkit-scrollbar-thumb,div::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}
      nav,div{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
    </style>
    <link rel="icon" type="image/png" href="/guild-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/guild-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO & Metadata -->
    <title>Guild — The Human Growth Engine</title>
    <meta name="description" content="Guild is a decentralized growth engine that ensures human potential is not wasted. Connect with verified builders, creators, and researchers through localized quest chapters." />
    <meta name="keywords" content="guild, growth, skills, quests, reputation, verification, career development, freelance, work, opportunity" />
    <meta name="author" content="Guild Federation" />
    <link rel="canonical" href="https://guild.com/" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- OpenGraph -->
    <meta property="og:title" content="Guild — The Human Growth Engine" />
    <meta property="og:description" content="Connect with verified professionals, complete skill-building quests, and build your reputation portfolio." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://guild.com/" />
    <meta property="og:site_name" content="Guild" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Guild — The Human Growth Engine" />
    <meta name="twitter:description" content="Connect with verified professionals, complete skill-building quests, and build your reputation portfolio." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Guild",
      "description": "A decentralized growth engine that ensures human potential is not wasted.",
      "url": "https://guild.com",
      "areaServed": "India",
      "serviceType": ["Career Development", "Skill Verification", "Professional Network"]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
